<!DOCTYPE html>
<html>
<head>
    <title>Jump Test</title>
    <style>
        body { margin: 0; background: #333; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #000; }
 #log { position: fixed; top: 10px; left: 10px; color: #0f0; font-family: monospace; font-size: 12px; background: rgba(0,0,0,0.8); padding: 10px; }
    </style>
</head>
<body>
    <div id="log"></div>
    <canvas id="c" width="400" height="300"></canvas>
    <script>
        const log = document.getElementById('log');
        function addLog(msg) {
            log.innerHTML = msg + '<br>' + log.innerHTML;
        }
        
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        
        // Simple variables
        let wantToJump = false;
        let player = { x: 50, y: 200, vy: 0, grounded: false, width: 30, height: 30 };
        const GRAVITY = 0.5;
        const JUMP_FORCE = -12;
        const GROUND_Y = 250;
        
        // Test with window events
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.key === ' ') {
                wantToJump = true;
                addLog('KEY: Space pressed, wantToJump=' + wantToJump);
                e.preventDefault();
            }
        });
        
        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space' || e.key === ' ') {
                wantToJump = false;
                addLog('KEY: Space released');
            }
        });
        
        function update() {
            // Jump
            if (wantToJump && player.grounded) {
                player.vy = JUMP_FORCE;
                player.grounded = false;
                wantToJump = false;
                addLog('JUMP! vy=' + player.vy);
            }
            
            // Gravity
            player.vy += GRAVITY;
            player.y += player.vy;
            
            // Ground collision
            if (player.y + player.height > GROUND_Y) {
                player.y = GROUND_Y - player.height;
                player.vy = 0;
                player.grounded = true;
            }
            
            addLog('frame: y=' + player.y.toFixed(1) + ' vy=' + player.vy.toFixed(1) + ' grounded=' + player.grounded + ' wantToJump=' + wantToJump);
        }
        
        function render() {
            ctx.fillStyle = '#222';
            ctx.fillRect(0, 0, 400, 300);
            
            // Ground
            ctx.fillStyle = '#0a0';
            ctx.fillRect(0, GROUND_Y, 400, 10);
            
            // Player
            ctx.fillStyle = player.grounded ? '#0f0' : '#f00';
            ctx.fillRect(player.x, player.y, player.width, player.height);
        }
        
        function gameLoop() {
            update();
            render();
            requestAnimationFrame(gameLoop);
        }
        
        gameLoop();
    </script>
</body>
</html>
