    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1A0500;
            font-family: 'Courier New', monospace;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            position: fixed;
            top: 0;
            left: 0;
            overscroll-behavior: none;
        }
        
        #gameCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            touch-action: none;
        }
        #touchControls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 160px;
            padding-bottom: env(safe-area-inset-bottom, 10px);
            display: none;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            pointer-events: none;
            z-index: 100;
        }
        #touchControls .move-btns {
            display: flex;
            gap: 15px;
        }
        #touchControls .action-btns {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        #restartBtn {
            font-size: 22px;
            width: 65px;
            height: 65px;
            opacity: 0.8;
        }
        .touch-btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: rgba(50, 10, 0, 0.7);
            border: 4px solid rgba(139, 0, 0, 0.9);
            color: rgba(255, 200, 200, 0.9);
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            transition: background 0.05s, transform 0.05s;
            box-shadow: 0 0 15px rgba(139, 0, 0, 0.5);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        .touch-btn:active, .touch-btn.active {
            background: rgba(139, 20, 0, 0.9);
            box-shadow: 0 0 25px rgba(139, 0, 0, 0.8);
            transform: scale(0.92);
        }
        #jumpBtn {
            width: 90px;
            height: 90px;
            font-size: 32px;
        }
        @media (max-width: 768px), (pointer: coarse) {
            #touchControls {
                display: flex;
            }
        }
        @media (max-height: 500px) {
            #touchControls {
                height: 120px;
                padding: 15px 20px;
            }
            .touch-btn {
                width: 60px;
                height: 60px;
            }
        }

const keys = {

    right: false,

    restart: false

let touchRight = false;

document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W' || e.key === ' ') { keys.jump = true; e.preventDefault(); }
    if (e.key === 'r' || e.key === 'R') keys.restart = true;
    
    // Prevent spacebar scrolling on mobile
    if (e.key === ' ') e.preventDefault();
});

document.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W' || e.key === ' ') keys.jump = false;
    if (e.key === 'r' || e.key === 'R') keys.restart = false;
});

// Touch controls
const leftBtn = document.getElementById('leftBtn');
const rightBtn = document.getElementById('rightBtn');
const jumpBtn = document.getElementById('jumpBtn');
const restartBtn = document.getElementById('restartBtn');

function setupTouchBtn(btn, key) {
    // Use pointer events for better mobile support
    btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        btn.setPointerCapture(e.pointerId);
        if (key === 'left') touchLeft = true;
        if (key === 'right') touchRight = true;
        if (key === 'jump') touchJump = true;
        btn.classList.add('active');
    });
    btn.addEventListener('pointerup', (e) => {
        e.preventDefault();
        if (key === 'left') touchLeft = false;
        if (key === 'right') touchRight = false;
        if (key === 'jump') touchJump = false;
        btn.classList.remove('active');
    });
    btn.addEventListener('pointercancel', (e) => {
        if (key === 'left') touchLeft = false;
        if (key === 'right') touchRight = false;
        if (key === 'jump') touchJump = false;
        btn.classList.remove('active');
    });
    btn.addEventListener('pointerleave', (e) => {
        if (key === 'left') touchLeft = false;
        if (key === 'right') touchRight = false;
        if (key === 'jump') touchJump = false;
        btn.classList.remove('active');
    });
    
    // Prevent context menu on long press
    btn.addEventListener('contextmenu', (e) => e.preventDefault());
}

setupTouchBtn(leftBtn, 'left');
setupTouchBtn(rightBtn, 'right');
setupTouchBtn(jumpBtn, 'jump');

// Restart button (separate handler)
restartBtn.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    keys.restart = true;
    restartBtn.classList.add('active');
});
restartBtn.addEventListener('pointerup', (e) => {
    e.preventDefault();
    keys.restart = false;
    restartBtn.classList.remove('active');
});
restartBtn.addEventListener('pointercancel', () => {

// ============================================================
// PLAYER
// ============================================================
let player = {
    x: 50,
    y: 100,
    vx: 0,
    vy: 0,
    width: PLAYER_SIZE,
    height: PLAYER_SIZE,
    grounded: false,
    jumpHeld: false,
    bobOffset: 0,
    bobTimer: 0,
    dead: false,
    flashTimer: 0,
    mirroredControls: false,
    stillTimer: 0,
    exited: false
};

function resetPlayer(spawnX, spawnY) {
    player.x = spawnX || 50;
    player.y = spawnY || 100;
    player.vx = 0;
    player.vy = 0;
    player.grounded = false;
    player.jumpHeld = false;
    player.dead = false;
    player.flashTimer = 0;
    player.mirroredControls = false;
    player.stillTimer = 0;
    player.exited = false;
}

function updatePlayer(level) {
    if (player.dead) return;

    // Check if controls are mirrored (Level 8)
    let moveLeft = keys.left || touchLeft;
    let moveRight = keys.right || touchRight;
    if (player.mirroredControls) {
        [moveLeft, moveRight] = [moveRight, moveLeft];
    }

    // Horizontal movement
    if (moveLeft) {
        player.vx -= PLAYER_ACCEL;
    } else if (moveRight) {
        player.vx += PLAYER_ACCEL;
    } else {
        player.vx *= PLAYER_FRICTION;
    }
    player.vx = Math.max(-PLAYER_SPEED, Math.min(PLAYER_SPEED, player.vx));

    // Gravity (check for inverted gravity)
    let gravity = level.invertedGravity ? -GRAVITY : GRAVITY;
    player.vy += gravity;
    player.vy = Math.max(-20, Math.min(20, player.vy));

    // Jump
    if ((keys.jump || touchJump) && player.grounded && !player.jumpHeld) {
        player.vy = level.invertedGravity ? -JUMP_FORCE : JUMP_FORCE;
        player.grounded = false;
        player.jumpHeld = true;
    }
    if (!keys.jump && !touchJump) {
        player.jumpHeld = false;
        // Variable jump height
        if (player.vy < 0) {
            player.vy *= 0.9;
        }
    }

    // Move and collide
    player.x += player.vx;
    resolveCollisionsX(level.platforms);
    
    player.y += player.vy;
    player.grounded = false;
    resolveCollisionsY(level.platforms);

    // Idle bob animation
    player.bobTimer += 0.1;
    player.bobOffset = Math.sin(player.bobTimer) * 2;

    // Still timer for level 10
    if (Math.abs(player.vx) < 0.1 && player.grounded) {
        player.stillTimer++;
    } else {
        player.stillTimer = 0;
    }
}

function resolveCollisionsX(platforms) {
    for (let p of platforms) {
        if (!p.solid) continue;
        if (checkAABB(player, p)) {
            if (player.vx > 0) {
                player.x = p.x - player.width;
            } else if (player.vx < 0) {
                player.x = p.x + p.width;
            }
            player.vx = 0;
        }
    }
}

function resolveCollisionsY(platforms) {
    for (let p of platforms) {
        if (!p.solid) continue;
        if (checkAABB(player, p)) {
            if (player.vy > 0) {
                player.y = p.y - player.height;
                player.grounded = true;
            } else if (player.vy < 0) {
                player.y = p.y + p.height;
            }
            player.vy = 0;
        }
    }
}

function checkAABB(a, b) {
    return a.x < b.x + b.width &&
           a.x + a.width > b.x &&
           a.y < b.y + b.height &&
           a.y + a.height > b.y;
}

// ============================================================
// DEATH & PARTICLES
// ============================================================
function killPlayer() {
    if (player.dead) return;
    player.dead = true;
    deathCount++;
    screenShake = 15;
    
    // Spawn death particles
    for (let i = 0; i < 30; i++) {
        particles.push({
            x: player.x + player.width / 2,
            y: player.y + player.height / 2,
            vx: (Math.random() - 0.5) * 15,
            vy: (Math.random() - 0.5) * 15,
            size: Math.random() * 8 + 3,
            color: COLORS.particle[Math.floor(Math.random() * COLORS.particle.length)],
            life: 60
        });
    }
    
    tauntText = TAUNTS[Math.floor(Math.random() * TAUNTS.length)];
    tauntTimer = 60;
    gameState = 'death';
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.3;
        p.life--;
        p.size *= 0.95;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function updateConfetti() {
    for (let i = confetti.length - 1; i >= 0; i--) {
        let c = confetti[i];
        c.x += c.vx;
        c.y += c.vy;
        c.vy += 0.1;
        c.rotation += c.rotSpeed;
        c.life--;
        if (c.life <= 0) confetti.splice(i, 1);
    }
}

function spawnConfetti() {
    for (let i = 0; i < 100; i++) {
        confetti.push({
            x: Math.random() * GAME_WIDTH,
            y: -20,
            vx: (Math.random() - 0.5) * 5,
            vy: Math.random() * 3 + 2,
            size: Math.random() * 10 + 5,

            rotation: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 0.2,
            life: 300
        });
    }
}

let currentLevelData = null;

// ============================================================
// TRAP LOGIC
// ============================================================
function updateTraps(level) {
    // Level 1: Invisible spike near exit
    if (level.traps) {
        for (let trap of level.traps) {
            if (trap.type === 'invisibleSpike' && !trap.triggered) {
                if (player.x > trap.triggerX) {
                    trap.triggered = true;
                    trap.spike.active = true;
                }
            }
        }
    }

    // Level 2: Gravity flip
    if (level.traps) {
        for (let trap of level.traps) {
            if (trap.type === 'gravityFlip' && !trap.triggered) {
                if (player.x > trap.triggerX) {
                    trap.triggered = true;
                    trap.inverted = true;
                    level.invertedGravity = true;
                }
            }
        }
    }

    // Level 3: Trapdoor button
    if (level.buttons) {
        for (let btn of level.buttons) {
            if (checkAABB(player, btn) && !btn.pressed) {
                btn.pressed = true;
                if (level.trapdoor) {
                    level.trapdoor.open = true;
                }
            }
        }
    }

    // Level 3: Trapdoor
    if (level.trapdoor && level.trapdoor.open) {
        // Remove trapdoor from collision
        for (let i = 0; i < level.platforms.length; i++) {
            if (level.platforms[i] === level.trapdoor) {
                level.platforms[i].solid = false;
            }
        }
    }

    // Level 4: Closing walls
    if (level.movingWalls) {
        for (let wall of level.movingWalls) {
            if (wall.isGap) {
                // Find real gap position
                let gapX = Math.min(wall.x, wall.targetX) + 100;
                wall.gapX = gapX;
            }
        }
    }

    // Level 7: Countdown pressure plate
    if (level.countdown) {
        if (checkAABB(player, { x: 300, y: 300, width: 200, height: 20 })) {
            if (Math.abs(player.vx) > 3) {
                level.countdown.triggeredBySpeed++;
                if (level.countdown.triggeredBySpeed > 10) {
                    level.countdown.triggered = true;
                }
            }
        }
    }

    // Level 8: Mirror trigger
    if (level.triggerTiles) {
        for (let tile of level.triggerTiles) {
            if (!tile.triggered && checkAABB(player, tile)) {
                tile.triggered = true;
                player.mirroredControls = true;
            }
        }
    }

    // Level 9: Moving exit
    if (level.exitMoving && !level.exitMoving.triggered) {
        let dist = Math.abs(player.x - level.exit.currentX);
        if (dist < 100 && level.exitMoving.movesLeft > 0) {
            level.exitMoving.triggered = true;
            level.exitMoving.movesLeft--;
            level.exit.x -= 200;
            setTimeout(() => {
                level.exitMoving.triggered = false;
            }, 100);
        }
    }

    // Level 10: Fake win screens
    if (level.fakeWinScreens) {
        for (let fake of level.fakeWinScreens) {
            if (!fake.triggered && checkAABB(player, fake)) {
                fake.triggered = true;
                resetLevel();
            }
        }
    }

    // Level 10: Stand still to win
    if (level.stillTimerRequired) {
        if (player.stillTimer >= level.stillTimerRequired) {
            gameState = 'win';
            spawnConfetti();
        }
    }
}

function checkSpikeCollision(level) {
    // Regular spikes
    for (let spike of level.spikes) {
        if (checkAABB(player, spike)) {
            killPlayer();
            return;
        }
    }

    // Invisible spike (Level 1)
    if (level.traps) {
        for (let trap of level.traps) {
            if (trap.type === 'invisibleSpike' && trap.spike.active) {
                if (checkAABB(player, trap.spike)) {
                    killPlayer();
                    return;
                }
            }
        }
    }

    // Fake platforms (Level 5)
    for (let plat of level.platforms) {
        if (plat.fake) {
            // Only check if player is above and falling
            if (player.vy > 0 && 
                player.x + player.width > plat.x && 
                player.x < plat.x + plat.width &&
                player.y + player.height >= plat.y &&
                player.y + player.height <= plat.y + 20) {
                killPlayer();
                return;
            }
        }
    }

    // Speed pads (Level 6)
    if (level.speedPads) {
        for (let pad of level.speedPads) {
            if (checkAABB(player, pad)) {
                player.vx = pad.boostX || 20;
            }
        }
    }

    // Out of bounds
    if (player.y > GAME_HEIGHT + 100 || player.y < -200 || 
        player.x < -100 || player.x > GAME_WIDTH + 100) {
        killPlayer();
    }
}

function checkExitCollision(level) {
    if (gameState === 'playing' && !player.exited && checkAABB(player, level.exit)) {
        player.exited = true;
        nextLevel();
    }
}

// ============================================================
// LEVEL MANAGEMENT
// ============================================================
function loadLevel(index) {
    currentLevel = index;
    currentLevelData = JSON.parse(JSON.stringify(levels[index]));
    
    // Re-enable platforms for cloned objects
    if (currentLevelData.trapdoor) {
        currentLevelData.trapdoor.open = false;
        for (let plat of currentLevelData.platforms) {
            if (plat === currentLevelData.trapdoor) {
                plat.solid = true;
            }
        }
    }
    
    // Reset traps
    if (currentLevelData.traps) {
        for (let trap of currentLevelData.traps) {
            if (trap.type === 'invisibleSpike') {
                trap.triggered = false;
                trap.spike.active = false;
            }
            if (trap.type === 'gravityFlip') {
                trap.triggered = false;
                trap.inverted = false;
            }
        }
    }
    currentLevelData.invertedGravity = false;
    
    // Reset buttons
    if (currentLevelData.buttons) {
        for (let btn of currentLevelData.buttons) {
            btn.pressed = false;
        }
    }
    
    // Reset trigger tiles
    if (currentLevelData.triggerTiles) {
        for (let tile of currentLevelData.triggerTiles) {
            tile.triggered = false;
        }
    }
    
    // Reset fake win screens
    if (currentLevelData.fakeWinScreens) {
        for (let fake of currentLevelData.fakeWinScreens) {
            fake.triggered = false;
        }
    }
    
    // Reset exit position
    if (currentLevelData.exitMoving) {
        currentLevelData.exit.x = currentLevelData.exitMoving.originalX;
        currentLevelData.exitMoving.movesLeft = 3;
        currentLevelData.exitMoving.triggered = false;
    }
    
    resetPlayer(currentLevelData.spawnX, currentLevelData.spawnY);
    player.exited = false;
}

function resetLevel() {
    loadLevel(currentLevel);
}

function nextLevel() {
    if (currentLevel < levels.length - 1) {
        currentLevel++;
        transitionTip = TIPS[currentLevel] || "Pro tip: Stay vigilant 😈";
        transitionText = `LEVEL ${currentLevel + 1}`;
        transitionTimer = 90;
        gameState = 'transition';
    } else {
        gameState = 'win';
        spawnConfetti();
    }
}

function startGame() {
    deathCount = 0;
    currentLevel = 0;
    transitionTip = TIPS[0];
    transitionText = 'LEVEL 1';
    transitionTimer = 90;
    gameState = 'transition';
}

// ============================================================
// CLICK HANDLER
// ============================================================
function handleClick(e) {
    e.preventDefault();
    
    if (gameState === 'start' || gameState === 'win') {
        startGame();
    }
}

// ============================================================
// RENDERING
// ============================================================
function drawBackground(level) {
    // Base dark background
    let skyGradient = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
    skyGradient.addColorStop(0, '#1A0500');
    skyGradient.addColorStop(0.5, '#2A0A00');
    skyGradient.addColorStop(1, '#3D1505');
    ctx.fillStyle = skyGradient;
    ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
    
    // Generate noise directly (no caching - fast enough for 500 dots)
    ctx.fillStyle = 'rgba(30, 5, 0, 0.15)';
    for (let i = 0; i < 500; i++) {
        ctx.fillRect(
            Math.random() * GAME_WIDTH,
            Math.random() * GAME_HEIGHT,
            Math.random() > 0.5 ? 2 : 1,
            Math.random() > 0.5 ? 2 : 1
        );
    }
    
    // Glowing sun aura - radial gradient from sun position (top-right corner) fading downward
    let auraGradient = ctx.createRadialGradient(GAME_WIDTH - 100, 80, 20, GAME_WIDTH - 100, 80, GAME_HEIGHT * 0.9);
    auraGradient.addColorStop(0, 'rgba(180, 30, 0, 0.6)');
    auraGradient.addColorStop(0.15, 'rgba(150, 25, 0, 0.5)');
    auraGradient.addColorStop(0.35, 'rgba(120, 20, 0, 0.35)');
    auraGradient.addColorStop(0.6, 'rgba(80, 15, 0, 0.2)');
    auraGradient.addColorStop(1, 'rgba(40, 5, 0, 0)');
    ctx.fillStyle = auraGradient;
    ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
    
    // INTENSE Blood red sun (radiant)
    ctx.fillStyle = '#FF2200';
    ctx.beginPath();
    ctx.arc(GAME_WIDTH - 100, 80, 35, 0, Math.PI * 2);
    ctx.fill();
    
    // Sun inner glow (bright center)
    let sunInnerGlow = ctx.createRadialGradient(GAME_WIDTH - 100, 80, 0, GAME_WIDTH - 100, 80, 35);
    sunInnerGlow.addColorStop(0, 'rgba(255, 100, 50, 1)');
    sunInnerGlow.addColorStop(0.7, 'rgba(200, 30, 0, 0.8)');
    sunInnerGlow.addColorStop(1, 'rgba(139, 0, 0, 1)');
    ctx.fillStyle = sunInnerGlow;
    ctx.fill();
    
    // Sun outer corona glow
    let sunGlow = ctx.createRadialGradient(GAME_WIDTH - 100, 80, 35, GAME_WIDTH - 100, 80, 120);
    sunGlow.addColorStop(0, 'rgba(255, 80, 30, 0.7)');
    sunGlow.addColorStop(0.4, 'rgba(200, 40, 0, 0.4)');
    sunGlow.addColorStop(0.7, 'rgba(150, 20, 0, 0.2)');
    sunGlow.addColorStop(1, 'rgba(100, 10, 0, 0)');
    ctx.fillStyle = sunGlow;
    ctx.fillRect(GAME_WIDTH - 220, -40, 240, 240);
    
    // Sun rays (subtle)
    ctx.strokeStyle = 'rgba(255, 80, 30, 0.15)';
    ctx.lineWidth = 2;
    for (let r = 0; r < 8; r++) {
        let angle = (r / 8) * Math.PI * 2;
        let rx = GAME_WIDTH - 100 + Math.cos(angle) * 50;
        let ry = 80 + Math.sin(angle) * 50;
        ctx.beginPath();
        ctx.moveTo(rx, ry);
        ctx.lineTo(rx + Math.cos(angle) * 100, ry + Math.sin(angle) * 100);
        ctx.stroke();
    }
    
    // Dark sand dunes in background (parallax feel)
    ctx.fillStyle = '#3D1A05';
    for (let d = 0; d < 5; d++) {
        let dx = d * 200 - 50;
        let dy = GAME_HEIGHT - 150 + Math.sin(d * 1.5) * 30;
        ctx.beginPath();
        ctx.moveTo(dx, GAME_HEIGHT);
        ctx.quadraticCurveTo(dx + 100, dy, dx + 200, GAME_HEIGHT);
        ctx.fill();
    }
    
    // Darker minecraft-style sandstone block pattern
    ctx.fillStyle = 'rgba(40, 15, 0, 0.2)';
    for (let x = 0; x < GAME_WIDTH; x += 32) {
        for (let y = GAME_HEIGHT - 80; y < GAME_HEIGHT; y += 32) {
            ctx.fillRect(x, y, 31, 31);
        }
    }
    
    // Dead bushes scattered (decorative)
    drawDeadBush(100, GAME_HEIGHT - 75);
    drawDeadBush(300, GAME_HEIGHT - 70);
    drawDeadBush(550, GAME_HEIGHT - 80);
    drawDeadBush(700, GAME_HEIGHT - 75);
}

function drawDeadBush(x, y) {
    ctx.strokeStyle = '#5D2A0A';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x, y - 20);
    ctx.lineTo(x - 8, y - 15);
    ctx.moveTo(x, y - 15);
    ctx.lineTo(x + 8, y - 12);
    ctx.moveTo(x, y - 10);
    ctx.lineTo(x - 5, y - 5);
    ctx.moveTo(x, y - 10);
    ctx.lineTo(x + 6, y - 6);
    ctx.stroke();
}

function drawPlatforms(level) {
    for (let plat of level.platforms) {
        if (!plat.solid && !plat.fake) continue;
        
        // Minecraft-style sandstone block texture
        ctx.fillStyle = plat.fake ? '#B8A267' : COLORS.sandstone;
        ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
        
        // Block border lines (Minecraft style)
        ctx.strokeStyle = plat.fake ? '#8B7355' : COLORS.sandstoneDark;
        ctx.lineWidth = 2;
        ctx.strokeRect(plat.x, plat.y, plat.width, plat.height);
        
        // Cached platform texture (generated once, reused)
        let texture = plat._texture;
        if (!texture) {
            texture = [];
            for (let dx = 4; dx < plat.width - 4; dx += 8) {
                for (let dy = 4; dy < plat.height - 4; dy += 8) {
                    if (Math.random() > 0.7) {
                        texture.push({ x: dx, y: dy });
                    }
                }
            }
            plat._texture = texture;
        }
        
        // Sand texture dots
        ctx.fillStyle = plat.fake ? '#A0926D' : COLORS.sandDark;
        for (let t of texture) {
            ctx.fillRect(plat.x + t.x, plat.y + t.y, 2, 2);
        }
        
        // Top edge highlight (sand grain)
        ctx.fillStyle = plat.fake ? '#C2B280' : '#E0C58C';
        ctx.fillRect(plat.x, plat.y, plat.width, 3);
        
        // Fake indicator (subtle)
        if (plat.fake) {
            ctx.fillStyle = 'rgba(139, 69, 19, 0.2)';
            ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
        }
    }
}

function drawSpikes(level) {
    // Draw cacti instead of spikes
    for (let spike of level.spikes) {
        drawCactus(spike.x, spike.y, spike.width, spike.height);
    }
    
    // Invisible cactus (traps)
    if (level.traps) {
        for (let trap of level.traps) {
            if (trap.type === 'invisibleSpike' && trap.spike.active) {
                drawCactus(trap.spike.x, trap.spike.y, trap.spike.width, trap.spike.height);
            }
        }
    }
}

function drawCactus(x, y, width, height) {
    let cactusCount = Math.max(1, Math.floor(width / 25));
    let cactusWidth = width / cactusCount;
    
    for (let i = 0; i < cactusCount; i++) {
        let cx = x + i * cactusWidth + cactusWidth / 2;
        
        // Main cactus body
        ctx.fillStyle = COLORS.cactus;
        ctx.fillRect(cx - 8, y, 16, height);
        
        // Cactus highlights
        ctx.fillStyle = COLORS.cactusDark;
        ctx.fillRect(cx - 8, y, 4, height);
        
        // Cactus segments (rounded top)
        ctx.fillStyle = COLORS.cactus;
        ctx.beginPath();
        ctx.arc(cx, y + 5, 8, 0, Math.PI * 2);
        ctx.fill();
        
        // Spines on cactus (dangerous thorns)
        ctx.strokeStyle = '#8B0000';
        ctx.lineWidth = 1;
        for (let s = 0; s < height; s += 12) {
            // Left spines
            ctx.beginPath();
            ctx.moveTo(cx - 8, y + s);
            ctx.lineTo(cx - 15, y + s - 3);
            ctx.stroke();
            // Right spines
            ctx.beginPath();
            ctx.moveTo(cx + 8, y + s);
            ctx.lineTo(cx + 15, y + s - 3);
            ctx.stroke();
        }
        
        // Small arm on some cacti
        if (i % 2 === 0 && height > 20) {
            ctx.fillStyle = COLORS.cactus;
            ctx.fillRect(cx + 8, y + 8, 10, 6);
            ctx.fillRect(cx + 14, y + 2, 6, 14);
            // Arm spines (dangerous thorns)
            ctx.strokeStyle = '#8B0000';
            ctx.beginPath();
            ctx.moveTo(cx + 14, y + 8);
            ctx.lineTo(cx + 20, y + 6);
            ctx.stroke();
        }
    }
}

function drawSpikeGroup(x, y, width, height) {
    let spikeWidth = 15;
    let count = Math.floor(width / spikeWidth);
    for (let i = 0; i < count; i++) {
        ctx.beginPath();
        ctx.moveTo(x + i * spikeWidth, y + height);
        ctx.lineTo(x + i * spikeWidth + spikeWidth / 2, y);
        ctx.lineTo(x + (i + 1) * spikeWidth, y + height);
        ctx.closePath();
        ctx.fill();
    }
}

function drawExit(level) {
    let exit = level.exit;
    
    // Dark dangerous temple door frame
    // Outer stone frame
    ctx.fillStyle = '#5D2A0A';
    ctx.fillRect(exit.x - 10, exit.y - 10, exit.width + 20, exit.height + 10);
    
    // Inner archway (dark interior with danger)
    ctx.fillStyle = '#2F0F05';
    ctx.beginPath();
    ctx.arc(exit.x + exit.width / 2, exit.y, exit.width / 2, Math.PI, 0);
    ctx.lineTo(exit.x + exit.width, exit.y + exit.height);
    ctx.lineTo(exit.x, exit.y + exit.height);
    ctx.closePath();
    ctx.fill();
    
    // Danger glow inside (red)
    let glowGradient = ctx.createRadialGradient(
        exit.x + exit.width / 2, exit.y + exit.height / 2, 0,
        exit.x + exit.width / 2, exit.y + exit.height / 2, 40
    );
    glowGradient.addColorStop(0, 'rgba(255, 69, 0, 0.5)');
    glowGradient.addColorStop(1, 'rgba(139, 0, 0, 0)');
    ctx.fillStyle = glowGradient;
    ctx.fillRect(exit.x - 20, exit.y - 20, exit.width + 40, exit.height + 40);
    
    // Dark sandstone details
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(exit.x - 8, exit.y - 8, 8, 8);
    ctx.fillRect(exit.x + exit.width, exit.y - 8, 8, 8);
    
    // Blood red trim
    ctx.fillStyle = '#8B0000';
    ctx.fillRect(exit.x - 10, exit.y + exit.height - 5, exit.width + 20, 5);
    
    // "Exit" text on sandstone
    ctx.fillStyle = '#FFFAFA';
    ctx.font = 'bold 10px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('EXIT', exit.x + exit.width / 2, exit.y + exit.height / 2 + 5);
}

function drawButtons(level) {
    if (!level.buttons) return;
    
    for (let btn of level.buttons) {
        ctx.fillStyle = btn.pressed ? '#006600' : COLORS.button;
        ctx.fillRect(btn.x, btn.y, btn.width, btn.height);
        
        ctx.fillStyle = COLORS.buttonText;
        ctx.font = 'bold 12px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('OPEN EXIT', btn.x + btn.width / 2, btn.y + 20);
    }
}

function drawSpeedPads(level) {
    if (!level.speedPads) return;
    
    for (let pad of level.speedPads) {
        // Sand glow effect
        ctx.fillStyle = 'rgba(218, 165, 32, 0.3)';
        ctx.fillRect(pad.x - 5, pad.y - 5, pad.width + 10, pad.height + 10);
        
        // Speed pad body (golden sandstone)
        ctx.fillStyle = '#DAA520';
        ctx.fillRect(pad.x, pad.y, pad.width, pad.height);
        
        // Etched arrows
        ctx.fillStyle = '#8B4513';
        ctx.font = 'bold 16px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('>>>', pad.x + pad.width / 2, pad.y + 20);
        
        // Top highlight
        ctx.fillStyle = '#FFD700';
        ctx.fillRect(pad.x, pad.y, pad.width, 3);
    }
}

function drawMovingWalls(level) {
    if (!level.movingWalls) return;
    
    for (let wall of level.movingWalls) {
        if (wall.decoy) {
            // Decoy wall (sand texture)
            ctx.fillStyle = 'rgba(139, 115, 85, 0.3)';
            ctx.fillRect(wall.x, wall.y, wall.width, wall.height);
            // Sand texture
            ctx.strokeStyle = '#A0926D';
            ctx.lineWidth = 1;
            ctx.strokeRect(wall.x, wall.y, wall.width, wall.height);
        } else {
            // Sandstone wall
            ctx.fillStyle = COLORS.sandstone;
            ctx.fillRect(wall.x, wall.y, wall.width, wall.height);
            
            // Border
            ctx.strokeStyle = COLORS.sandstoneDark;
            ctx.lineWidth = 2;
            ctx.strokeRect(wall.x, wall.y, wall.width, wall.height);
            
            // Sand texture
            ctx.fillStyle = COLORS.sandDark;
            for (let dx = 4; dx < wall.width - 4; dx += 8) {
                for (let dy = 4; dy < wall.height - 4; dy += 8) {
                    if (Math.random() > 0.7) {
                        ctx.fillRect(wall.x + dx, wall.y + dy, 2, 2);
                    }
                }
            }
        }
    }
}

function drawCountdown(level) {
    if (!level.countdown) return;
    
    let seconds = Math.ceil(level.countdown.timer / 60);
    
    // Desert-themed countdown display
    ctx.fillStyle = level.countdown.triggered ? '#8B0000' : '#4A3728';
    ctx.font = 'bold 48px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(seconds.toString(), GAME_WIDTH / 2, 80);
    
    if (level.countdown.triggered) {
        ctx.fillStyle = '#8B0000';
        ctx.font = 'bold 20px Courier New';
        ctx.fillText('CACTI ACTIVATED!', GAME_WIDTH / 2, 120);
    }
}

function drawFakeWinScreens(level) {
    if (!level.fakeWinScreens) return;
    
    for (let fake of level.fakeWinScreens) {
        if (fake.triggered) continue;
        
        // Desert temple chest style background
        ctx.fillStyle = 'rgba(74, 55, 40, 0.95)';
        ctx.fillRect(fake.x, fake.y, fake.width, fake.height);
        
        // Gold border
        ctx.strokeStyle = '#DAA520';
        ctx.lineWidth = 4;
        ctx.strokeRect(fake.x, fake.y, fake.width, fake.height);
        
        // Inner border
        ctx.strokeStyle = '#8B4513';
        ctx.lineWidth = 2;
        ctx.strokeRect(fake.x + 5, fake.y + 5, fake.width - 10, fake.height - 10);
        
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 36px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('TREASURE!', fake.x + fake.width / 2, fake.y + 80);
        
        ctx.font = '20px Courier New';
        ctx.fillStyle = '#DEB887';
        ctx.fillText('Deaths: ' + deathCount, fake.x + fake.width / 2, fake.y + 130);
        
        // Fake shimmer effect
        ctx.fillStyle = 'rgba(255, 215, 0, 0.2)';
        ctx.fillRect(fake.x + 10, fake.y + 10, fake.width - 20, fake.height / 3);
    }
}

function drawTriggerTiles(level) {
    if (!level.triggerTiles) return;
    
    for (let tile of level.triggerTiles) {
        if (!tile.triggered) {
            ctx.fillStyle = tile.mirror ? 'rgba(255, 0, 255, 0.2)' : COLORS.trigger;
            ctx.fillRect(tile.x, tile.y, tile.width, tile.height);
        }
    }
}

function drawPlayer() {
    if (player.dead) return;
    
    let px = player.x;
    let py = player.y + player.bobOffset;
    let cx = px + player.width / 2;
    
    // Shadow under player
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
    ctx.beginPath();
    ctx.ellipse(cx, py + player.height + 3, player.width / 2 + 2, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // === FEET - Dark maroon
    ctx.fillStyle = '#4A2020';
    ctx.fillRect(px + 2, py + player.height - 2, 10, 6);
    ctx.fillRect(px + player.width - 12, py + player.height - 2, 10, 6);
    
    // === BODY - Mature dark maroon/brown
    ctx.fillStyle = '#5C2020';
    ctx.fillRect(px + 4, py + 15, player.width - 8, player.height - 18);
    
    // Body shading (right side darker)
    ctx.fillStyle = '#3D1515';
    ctx.fillRect(px + 4, py + 15, 4, player.height - 18);
    
    // === TAIL - Dark maroon ball
    ctx.fillStyle = '#4A1818';
    ctx.fillRect(px + player.width - 2, py + player.height - 16, 10, 10);
    ctx.fillStyle = '#3D1515';
    ctx.fillRect(px + player.width + 4, py + player.height - 14, 4, 4);
    
    // === HEAD - Dark maroon
    ctx.fillStyle = '#5C2020';
    ctx.fillRect(cx - 14, py + 2, 28, 24);
    
    // Head shading
    ctx.fillStyle = '#3D1515';
    ctx.fillRect(cx - 14, py + 2, 4, 24);
    
    // === EARS - Boxy rounded tops, dark maroon
    // Left ear outer
    ctx.fillStyle = '#5C2020';
    ctx.fillRect(px + 2, py - 12, 10, 18);
    // Left ear top (rounded)
    ctx.beginPath();
    ctx.arc(px + 7, py - 12, 5, Math.PI, 0);
    ctx.fill();
    // Left ear inner (dark maroon)
    ctx.fillStyle = '#3D1515';
    ctx.fillRect(px + 4, py - 10, 6, 14);
    ctx.beginPath();
    ctx.arc(px + 7, py - 10, 3, Math.PI, 0);
    ctx.fill();
    
    // Right ear outer
    ctx.fillStyle = '#5C2020';
    ctx.fillRect(px + player.width - 12, py - 12, 10, 18);
    // Right ear top (rounded)
    ctx.beginPath();
    ctx.arc(px + player.width - 7, py - 12, 5, Math.PI, 0);
    ctx.fill();
    // Right ear inner (dark maroon)
    ctx.fillStyle = '#3D1515';
    ctx.fillRect(px + player.width - 10, py - 10, 6, 14);
    ctx.beginPath();
    ctx.arc(px + player.width - 7, py - 10, 3, Math.PI, 0);
    ctx.fill();
    
    // === EYES - Fierce dark red
    // Eye outline (darker)
    ctx.fillStyle = '#1A0505';
    ctx.fillRect(cx - 11, py + 5, 10, 12);
    ctx.fillRect(cx + 1, py + 5, 10, 12);
    
    // Pupils (dark red)
    ctx.fillStyle = '#5C1010';
    ctx.fillRect(cx - 9, py + 7, 8, 10);
    ctx.fillRect(cx + 3, py + 7, 8, 10);
    
    // Eye shine (amber glint)
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(cx - 7, py + 7, 3, 3);
    ctx.fillRect(cx + 5, py + 7, 3, 3);
    
    // === NOSE - Dark maroon
    ctx.fillStyle = '#2A1010';
    ctx.fillRect(cx - 3, py + 18, 6, 4);
    
    // === MOUTH - Serious straight line
    ctx.strokeStyle = '#2A1010';
    ctx.lineWidth = 2;
    ctx.lineCap = 'square';
    ctx.beginPath();
    ctx.moveTo(cx - 5, py + 24);
    ctx.lineTo(cx + 5, py + 24);
    ctx.stroke();
}

function drawParticles() {
    for (let p of particles) {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life / 60;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
}

function drawConfetti() {
    for (let c of confetti) {
        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.rotate(c.rotation);
        ctx.fillStyle = c.color;
        ctx.globalAlpha = c.life / 300;
        ctx.fillRect(-c.size / 2, -c.size / 2, c.size, c.size / 2);
        ctx.restore();
    }
    ctx.globalAlpha = 1;
}

function drawUI() {
    // Death counter (sandstone carved style)
    ctx.fillStyle = '#4A3728';
    ctx.font = 'bold 20px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText('DEATHS: ' + deathCount, 20, 35);
    
    // Level indicator
    ctx.textAlign = 'right';
    ctx.fillText('LEVEL ' + (currentLevel + 1), GAME_WIDTH - 20, 35);
}

function drawStartScreen() {
    drawBackground(null);
    
    // Animated background danger silhouette
    let time = Date.now() / 1000;
    ctx.fillStyle = 'rgba(139, 0, 0, 0.1)';
    ctx.beginPath();
    ctx.arc(GAME_WIDTH / 2 + Math.sin(time) * 50, GAME_HEIGHT / 2 + 50, 150, 0, Math.PI * 2);
    ctx.fill();
    
    // Title with danger effect
    ctx.shadowColor = '#8B0000';
    ctx.shadowBlur = 15;
    ctx.fillStyle = '#FF4500';
    ctx.font = 'bold 72px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('DANGER ZONE', GAME_WIDTH / 2, GAME_HEIGHT / 2 - 50);
    ctx.shadowBlur = 0;
    
    // Tagline
    ctx.font = '24px Courier New';
    ctx.fillStyle = '#CD5C5C';
    ctx.fillText('Will the rabbit survive the deadly desert?', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 10);
    
    // Start button
    let btnWidth = 300;
    let btnHeight = 60;
    let btnX = GAME_WIDTH / 2 - btnWidth / 2;
    let btnY = GAME_HEIGHT / 2 + 60;
    
    ctx.fillStyle = '#8B0000';
    ctx.fillRect(btnX, btnY, btnWidth, btnHeight);
    ctx.strokeStyle = '#FF4500';
    ctx.lineWidth = 3;
    ctx.strokeRect(btnX, btnY, btnWidth, btnHeight);
    
    ctx.fillStyle = '#FFFAFA';
    ctx.font = 'bold 28px Courier New';
    ctx.fillText('START HOPPING', GAME_WIDTH / 2, btnY + 40);
    
    // Controls hint
    ctx.font = '16px Courier New';
    ctx.fillStyle = 'rgba(255, 250, 250, 0.6)';
    ctx.fillText('Arrow Keys / WASD to move • Space to jump • R to restart', GAME_WIDTH / 2, GAME_HEIGHT - 50);
}

function drawTransitionScreen() {
    let levelData = levels[currentLevel] || levels[0];
    drawBackground(levelData);
    
    // Level text (danger carved style)
    ctx.shadowColor = '#8B0000';
    ctx.shadowBlur = 15;
    ctx.fillStyle = '#FF4500';
    ctx.font = 'bold 64px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(transitionText, GAME_WIDTH / 2, GAME_HEIGHT / 2 - 30);
    ctx.shadowBlur = 0;
    
    // Tip
    ctx.font = '20px Courier New';
    ctx.fillStyle = '#CD5C5C';
    ctx.fillText(transitionTip, GAME_WIDTH / 2, GAME_HEIGHT / 2 + 30);
}

function drawDeathOverlay() {
    // Dangerous red dust overlay
    ctx.fillStyle = 'rgba(139, 0, 0, 0.7)';
    ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
    
    ctx.fillStyle = '#FFFAFA';
    ctx.font = 'bold 36px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('DEATHS: ' + deathCount, GAME_WIDTH / 2, GAME_HEIGHT / 2 - 20);
    
    ctx.font = '28px Courier New';
    ctx.fillStyle = '#FF4500';
    ctx.fillText(tauntText, GAME_WIDTH / 2, GAME_HEIGHT / 2 + 30);
}

function drawWinScreen() {
    drawBackground(null);
    drawConfetti();
    
    // Victory banner
    ctx.fillStyle = 'rgba(139, 0, 0, 0.9)';
    ctx.fillRect(0, GAME_HEIGHT / 2 - 120, GAME_WIDTH, 240);
    
    // Blood red borders
    ctx.strokeStyle = '#FF4500';
    ctx.lineWidth = 5;
    ctx.strokeRect(0, GAME_HEIGHT / 2 - 120, GAME_WIDTH, 240);
    
    // Title
    ctx.shadowColor = '#8B0000';
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#FF4500';
    ctx.font = 'bold 48px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('THE RABBIT ESCAPED!', GAME_WIDTH / 2, GAME_HEIGHT / 2 - 50);
    
    ctx.font = 'bold 36px Courier New';
    ctx.fillStyle = '#CD5C5C';
    ctx.fillText('FREEDOM AT LAST! 🐰', GAME_WIDTH / 2, GAME_HEIGHT / 2);
    ctx.shadowBlur = 0;
    
    // Death count
    ctx.font = '28px Courier New';
    ctx.fillStyle = '#FFFAFA';
    ctx.fillText('Total Deaths: ' + deathCount, GAME_WIDTH / 2, GAME_HEIGHT / 2 + 50);
    
    // Rating
    let rating = deathCount === 0 ? 'PERFECT! The smartest rabbit ever!' :
                 deathCount < 5 ? 'Impressive! True desert hopper!' :
                 deathCount < 20 ? 'Not bad! Learning the sands!' :
                 'Better luck in the next desert!';
    ctx.font = '20px Courier New';
    ctx.fillText(rating, GAME_WIDTH / 2, GAME_HEIGHT / 2 + 90);
    
    // Play again button (danger red)
    let btnWidth = 300;
    let btnHeight = 60;
    let btnX = GAME_WIDTH / 2 - btnWidth / 2;
    let btnY = GAME_HEIGHT / 2 + 130;
    
    ctx.fillStyle = '#8B0000';
    ctx.fillRect(btnX, btnY, btnWidth, btnHeight);
    ctx.strokeStyle = '#FF4500';
    ctx.lineWidth = 3;
    ctx.strokeRect(btnX, btnY, btnWidth, btnHeight);
    
    ctx.fillStyle = '#FFFAFA';
    ctx.font = 'bold 24px Courier New';
    ctx.fillText('PLAY AGAIN', GAME_WIDTH / 2, btnY + 38);
}

// ============================================================
// GAME LOOP
// ============================================================
function update() {
    if (gameState === 'playing') {
        updatePlayer(currentLevelData);
        updateTraps(currentLevelData);
        checkSpikeCollision(currentLevelData);
        checkExitCollision(currentLevelData);
        
        if (keys.restart) {
            resetLevel();
        }
    } else if (gameState === 'death') {
        updateParticles();
        tauntTimer--;
        if (tauntTimer <= 0) {
            resetLevel();
            gameState = 'playing';
        }
    } else if (gameState === 'transition') {
        transitionTimer--;
        if (transitionTimer <= 0) {
            loadLevel(currentLevel);
            gameState = 'playing';
        }
    } else if (gameState === 'win') {
        updateConfetti();
        // Keep spawning confetti
        if (confetti.length < 50 && Math.random() < 0.3) {
            confetti.push({
                x: Math.random() * GAME_WIDTH,
                y: -20,
                vx: (Math.random() - 0.5) * 5,
                vy: Math.random() * 3 + 2,
                size: Math.random() * 10 + 5,
                color: COLORS.particle[Math.floor(Math.random() * COLORS.particle.length)],
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.2,
                life: 300
            });
        }
    }
    
    // Update screen shake
    if (screenShake > 0) screenShake *= 0.9;
    if (screenShake < 0.5) screenShake = 0;
}

function render() {
    // Clear canvas
    ctx.fillStyle = '#1A0500';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Apply scaling and centering
    ctx.save();
    ctx.translate(offsetX, offsetY);
    ctx.scale(scale, scale);
    
    // Apply screen shake
    if (screenShake > 0) {
        ctx.translate(
            (Math.random() - 0.5) * screenShake,
            (Math.random() - 0.5) * screenShake
        );
    }
    
    if (gameState === 'start') {
        drawStartScreen();
    } else if (gameState === 'transition') {
        drawTransitionScreen();
    } else if (gameState === 'win') {
        drawWinScreen();
    } else if (gameState === 'playing' || gameState === 'death') {
        drawBackground(currentLevelData);
        drawPlatforms(currentLevelData);
        drawTriggerTiles(currentLevelData);
        drawSpikes(currentLevelData);
        drawButtons(currentLevelData);
        drawSpeedPads(currentLevelData);
        drawMovingWalls(currentLevelData);
        drawExit(currentLevelData);
        drawFakeWinScreens(currentLevelData);
        drawCountdown(currentLevelData);
        drawPlayer();
        drawParticles();
        drawUI();
        
        if (gameState === 'death') {
            drawDeathOverlay();
        }
    }
    
    ctx.restore();
}

// ============================================================
// RESIZE HANDLING & SCALING (must be before gameLoop)
// ============================================================
const BASE_WIDTH = 800;
const BASE_HEIGHT = 450;
let GAME_WIDTH = BASE_WIDTH;
let GAME_HEIGHT = BASE_HEIGHT;
let scale = 1;
let offsetX = 0;
let offsetY = 0;

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    // Use portrait orientation for mobile, landscape for desktop
    let isMobile = window.innerWidth < 768 || 'ontouchstart' in window;
    if (isMobile && window.innerHeight > window.innerWidth) {
        // Portrait mode - swap dimensions
        GAME_WIDTH = 450;
        GAME_HEIGHT = 800;
    } else {
        GAME_WIDTH = BASE_WIDTH;
        GAME_HEIGHT = BASE_HEIGHT;
    }
    
    // Calculate scale to fit game in screen while maintaining aspect ratio
    let scaleX = canvas.width / GAME_WIDTH;
    let scaleY = canvas.height / GAME_HEIGHT;
    scale = Math.min(scaleX, scaleY);
    
    // Center the game
    offsetX = (canvas.width - GAME_WIDTH * scale) / 2;
    offsetY = (canvas.height - GAME_HEIGHT * scale) / 2;
}

function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
}

// Initialize after constants are defined
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));
resizeCanvas();
</script>
